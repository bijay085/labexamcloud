<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
      color: #333;
    }

    h1 {
      color: #2c3e50;
    }

    p {
      line-height: 1.6;
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
  <p>This is a simple HTML page with basic CSS.</p>
  <button onclick="alert('Cloud Computing Lab Bijay!')">Click Me</button>
</body>
</html>
